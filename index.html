<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>محاكي غرفة الـ VAR الاحترافي</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-color: #161d30;
            --accent-color: #00ff66;
            --danger-color: #ff3333;
            --text-color: #ffffff;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden;
            user-select: none;
        }

        .var-container {
            display: grid;
            grid-template-columns: 280px 1fr 300px;
            height: 100vh;
            gap: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        .panel {
            background: var(--panel-color);
            border-radius: 8px;
            border: 1px solid #24324f;
            padding: 15px;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .main-monitor-area {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .screen-wrapper {
            position: relative;
            flex: 1;
            background: #000;
            border-radius: 8px;
            overflow: hidden;
            border: 2px solid #24324f;
        }

        .screen-wrapper.active-review {
            border-color: var(--danger-color);
            box-shadow: 0 0 15px rgba(255, 51, 51, 0.5);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: auto;
            cursor: crosshair;
        }

        .live-indicator {
            position: absolute;
            top: 15px;
            right: 15px;
            background: rgba(255, 0, 0, 0.8);
            padding: 5px 10px;
            border-radius: 4px;
            font-weight: bold;
            font-size: 12px;
            letter-spacing: 1px;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0.4; }
        }

        .watermark {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 24px;
            font-weight: bold;
            color: rgba(255, 255, 255, 0.3);
        }

        .camera-feeds {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            height: 120px;
        }

        .cam-box {
            background: #000;
            border-radius: 6px;
            overflow: hidden;
            position: relative;
            cursor: pointer;
            border: 2px solid transparent;
            transition: 0.2s;
        }

        .cam-box.active {
            border-color: var(--accent-color);
        }

        .cam-box video {
            pointer-events: none;
        }

        .cam-label {
            position: absolute;
            bottom: 3px;
            right: 5px;
            background: rgba(0,0,0,0.7);
            font-size: 11px;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .controls-row {
            display: flex;
            gap: 10px;
            justify-content: center;
            background: var(--panel-color);
            padding: 10px;
            border-radius: 8px;
        }

        button {
            background: #24324f;
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.2s;
        }

        button:hover {
            background: #344870;
        }

        .btn-danger {
            background: var(--danger-color);
        }
        .btn-danger:hover { background: #cc0000; }

        .comms-status {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #1f2a45;
            padding: 10px;
            border-radius: 6px;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            background: var(--accent-color);
            border-radius: 50%;
        }

        .timeline-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .timeline {
            flex: 1;
            accent-color: var(--accent-color);
        }
    </style>
</head>
<body>

    <div class="var-container">
        
        <div class="panel">
            <h3>أدوات الخطوط (Offside)</h3>
            <button onclick="setLineColor('#ff3333')">الخط الأحمر (المهاجم)</button>
            <button onclick="setLineColor('#3377ff')">الخط الأزرق (المدافع)</button>
            <button onclick="clearLines()" class="btn-danger">مسح الخطوط</button>
            <hr style="border-color: #24324f; width: 100%;">
            <h3>سرعة الإعادة (Slow Motion)</h3>
            <button onclick="changeSpeed(1)">سرعة طبيعية (1x)</button>
            <button onclick="changeSpeed(0.5)">سرعة بطيئة (0.5x)</button>
            <button onclick="changeSpeed(0.25)">العرض البطيء جداً (0.25x)</button>
        </div>

        <div class="main-monitor-area">
            <div class="screen-wrapper" id="mainScreenWrapper">
                <div class="live-indicator" id="liveTag">V O R - LIVE</div>
                <div class="watermark" id="camWatermark">CAM 1 - MAIN</div>
                
                <video id="mainVideo" loop muted autoplay src="https://vjs.zencdn.net/v/oceans.mp4"></video>
                <canvas id="lineCanvas"></canvas>
            </div>

            <div class="controls-row">
                <div class="timeline-container">
                    <span>التايملاين:</span>
                    <input type="range" class="timeline" id="videoTimeline" min="0" max="100" value="0">
                </div>
            </div>

            <div class="controls-row">
                <button onclick="stepFrame(-1)">◀ إطار للخلف</button>
                <button onclick="togglePlay()" id="playBtn">إيقاف مؤقت</button>
                <button onclick="stepFrame(1)">إطار للأمام ▶</button>
            </div>

            <div class="camera-feeds">
                <div class="cam-box active" onclick="switchCamera(1, 'https://vjs.zencdn.net/v/oceans.mp4', this)">
                    <video muted loop autoplay src="https://vjs.zencdn.net/v/oceans.mp4"></video>
                    <div class="cam-label">CAM 1 (رئيسية)</div>
                </div>
                <div class="cam-box" onclick="switchCamera(2, 'https://html5demos.com/assets/dizzy.mp4', this)">
                    <video muted loop autoplay src="https://html5demos.com/assets/dizzy.mp4"></video>
                    <div class="cam-label">CAM 2 (تسلل)</div>
                </div>
                <div class="cam-box" onclick="switchCamera(3, 'https://www.w3schools.com/html/mov_bbb.mp4', this)">
                    <video muted loop autoplay src="https://www.w3schools.com/html/mov_bbb.mp4"></video>
                    <div class="cam-label">CAM 3 (خط المرمى)</div>
                </div>
                <div class="cam-box" onclick="switchCamera(4, 'https://media.w3.org/2010/05/sintel/trailer_hd.mp4', this)">
                    <video muted loop autoplay src="https://media.w3.org/2010/05/sintel/trailer_hd.mp4"></video>
                    <div class="cam-label">CAM 4 (عكسية)</div>
                </div>
            </div>
        </div>

        <div class="panel">
            <h3>الاتصال المباشر (R-COM)</h3>
            <div class="comms-status">
                <div class="status-dot"></div>
                <span>الاتصال مع حكم الساحة: نشط</span>
            </div>
            <hr style="border-color: #24324f; width: 100%;">
            <button class="btn-danger" id="onFieldReviewBtn" onclick="toggleOFR()">طلب مراجعة شاشة الساحة (OFR)</button>
            <hr style="border-color: #24324f; width: 100%;">
            <h3>القرار النهائي المقترح</h3>
            <button style="background: #2e7d32;" onclick="triggerDecision('ركلة جزاء')">ركلة جزاء</button>
            <button style="background: #c62828;" onclick="triggerDecision('بطاقة حمراء')">بطاقة حمراء</button>
            <button style="background: #1565c0;" onclick="triggerDecision('هدف صحيح')">هدف صحيح</button>
        </div>
    </div>

    <script>
        const video = document.getElementById('mainVideo');
        const canvas = document.getElementById('lineCanvas');
        const ctx = canvas.getContext('2d');
        const timeline = document.getElementById('videoTimeline');
        let lineColor = '#ff3333';
        let lines = [];

        function resizeCanvas() {
            canvas.width = canvas.offsetWidth;
            canvas.height = canvas.offsetHeight;
            redrawLines();
        }
        window.addEventListener('load', resizeCanvas);
        window.addEventListener('resize', resizeCanvas);

        function togglePlay() {
            if (video.paused) {
                video.play();
                document.getElementById('playBtn').innerText = 'إيقاف مؤقت';
            } else {
                video.pause();
                document.getElementById('playBtn').innerText = 'تشغيل';
            }
        }

        function changeSpeed(speed) {
            video.playbackRate = speed;
        }

        function stepFrame(direction) {
            video.pause();
            document.getElementById('playBtn').innerText = 'تشغيل';
            video.currentTime += direction * 0.04; 
        }

        video.addEventListener('timeupdate', () => {
            const value = (video.currentTime / video.duration) * 100;
            timeline.value = value || 0;
        });

        timeline.addEventListener('input', () => {
            const time = (timeline.value / 100) * video.duration;
            video.currentTime = time;
        });

        function switchCamera(camNumber, videoSrc, element) {
            document.querySelectorAll('.cam-box').forEach(box => box.classList.remove('active'));
            element.classList.add('active');
            
            video.src = videoSrc;
            video.play();
            document.getElementById('playBtn').innerText = 'إيقاف مؤقت';
            
            document.getElementById('camWatermark').innerText = `CAM ${camNumber} - ` + (camNumber===2 ? 'OFFSIDE VIEW' : camNumber===3 ? 'GOAL LINE' : 'LIVE FEED');
            clearLines();
        }

        function setLineColor(color) { lineColor = color; }

        canvas.addEventListener('mousedown', (e) => {
            const rect = canvas.getBoundingClientRect();
            const x = e.clientX - rect.left;
            const y = e.clientY - rect.top;
            lines.push({ y: y, color: lineColor });
            redrawLines();
        });

        function redrawLines() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            lines.forEach(line => {
                ctx.beginPath();
                ctx.strokeStyle = line.color;
                ctx.lineWidth = 3;
                ctx.moveTo(0, line.y - 10);
                ctx.lineTo(canvas.width, line.y + 10);
                ctx.stroke();
            });
        }

        function clearLines() {
            lines = [];
            ctx.clearRect(0, 0, canvas.width, canvas.height);
        }

        function toggleOFR() {
            const wrapper = document.getElementById('mainScreenWrapper');
            const btn = document.getElementById('onFieldReviewBtn');
            const tag = document.getElementById('liveTag');
            
            if(wrapper.classList.contains('active-review')) {
                wrapper.classList.remove('active-review');
                btn.innerText = "طلب مراجعة شاشة الساحة (OFR)";
                tag.innerText = "V O R - LIVE";
                tag.style.background = "rgba(255, 0, 0, 0.8)";
            } else {
                wrapper.classList.add('active-review');
                btn.innerText = "إنهاء مراجعة الساحة";
                tag.innerText = "SCREEN REVIEW (OFR)";
                tag.style.background = "var(--danger-color)";
                alert("🔴 تم إرسال الإشارة لحكم الساحة للتوجه إلى الشاشة الآن!");
            }
        }

        function triggerDecision(decisionType) {
            alert(`⚠️ تم إرسال القرار النهائي إلى الحكم الرئيسي: [ ${decisionType} ]`);
        }
    </script>
</body>
</html>
